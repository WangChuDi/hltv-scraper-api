tags:
  - Events
parameters:
  - name: url
    in: query
    type: string
    required: true
    description: HLTV event URL or relative /events/... path
    example: /events/8241/esl-pro-league-season-23-stage-1
responses:
  200:
    description: Event with grouped events
  400:
    description: Missing or invalid URL parameter
  404:
    description: Failed to fetch event details
  500:
    description: Server error
